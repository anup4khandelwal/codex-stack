<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>codex-stack QA Reports</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --ink: #1d1c1a;
      --muted: #6d665c;
      --line: #ded6ca;
      --critical: #b42318;
      --warning: #b54708;
      --pass: #067647;
      --accent: #1d4ed8;
      --shadow: 0 18px 40px rgba(29, 28, 26, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 32%),
        radial-gradient(circle at top right, rgba(180, 71, 8, 0.08), transparent 28%),
        linear-gradient(180deg, #f7f4ee 0%, var(--bg) 100%);
    }
    main { max-width: 1100px; margin: 0 auto; padding: 48px 20px 80px; }
    header { margin-bottom: 32px; }
    h1 {
      margin: 0 0 8px;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      font-size: clamp(2rem, 3.8vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }
    p.lead { margin: 0; color: var(--muted); max-width: 760px; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .toolbar {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .grid {
      display: grid;
      gap: 18px;
    }
    .grid.two {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status.pass, .pill.pass { background: rgba(6, 118, 71, 0.12); color: var(--pass); }
    .status.warning, .pill.warning { background: rgba(181, 71, 8, 0.12); color: var(--warning); }
    .status.critical, .pill.critical { background: rgba(180, 35, 24, 0.12); color: var(--critical); }
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }
    .report-card h2, .section h2 { margin-top: 0; font-size: 1.2rem; }
    .report-card p { color: var(--muted); line-height: 1.5; }
    .meta {
      margin: 16px 0;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .links, .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }
    .links a, .detail-links a {
      font-weight: 600;
      padding: 0.5rem 0.85rem;
      background: rgba(29, 78, 216, 0.08);
      border-radius: 999px;
    }
    .statline {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
    }
    ul.clean {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }
    .finding {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fff;
    }
    .finding.warning { border-color: rgba(181, 71, 8, 0.22); }
    .finding.critical { border-color: rgba(180, 35, 24, 0.22); }
    .finding-head {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.22rem 0.55rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .evidence {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .preview {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
    }
    .preview img, .preview object {
      display: block;
      width: 100%;
      max-height: 540px;
      object-fit: contain;
      background: #f8f5ee;
    }
    .empty { color: var(--muted); }
    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    @media (max-width: 720px) {
      main { padding: 32px 16px 56px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>codex-stack QA Reports</h1>
      <p class="lead">Stable GitHub Pages view for tracked QA evidence generated during shipping.</p>
      <div class="toolbar"><span>Pages base</span><a href="https://anup4khandelwal.github.io/codex-stack/">https://anup4khandelwal.github.io/codex-stack/</a></div>
    </header>
    <section class="report-grid"><section class="card"><p class="empty">No published QA reports were found under docs/qa/ yet.</p></section></section>
    <footer>Generated by codex-stack QA Pages.</footer>
  </main>
</body>
</html>
