name: daily-update-check

on:
  schedule:
    - cron: "21 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install dependencies
        run: bun install

      - name: Run upgrade check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bun scripts/upgrade-check.ts --repo "${{ github.repository }}" --markdown-out daily-update-check.md --json-out daily-update-check.json

      - name: Add step summary
        run: cat daily-update-check.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload upgrade report
        uses: actions/upload-artifact@v7.0.0
        with:
          name: daily-update-check
          path: |
            daily-update-check.md
            daily-update-check.json

      - name: Sync daily update issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const title = "Daily codex-stack update check";
            const marker = "<!-- codex-stack:daily-update-check -->";
            const body = fs.readFileSync("daily-update-check.md", "utf8");
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            );
            if (existing) {
              if (existing.body !== body) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  body,
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automation"],
              });
            }
