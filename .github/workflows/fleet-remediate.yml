name: fleet-remediate

on:
  schedule:
    - cron: "43 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install dependencies
        run: bun install

      - name: Run fleet remediation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          bun src/cli.ts fleet remediate \
            --manifest .codex-stack/fleet.anup4khandelwal.json \
            --open-prs \
            --issue-repo anup4khandelwal/codex-stack \
            --markdown-out fleet-remediation.md \
            --json-out fleet-remediation.json

      - name: Add step summary
        run: cat fleet-remediation.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload remediation report
        uses: actions/upload-artifact@v7.0.0
        with:
          name: fleet-remediation
          path: |
            fleet-remediation.md
            fleet-remediation.json
