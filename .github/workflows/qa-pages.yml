name: qa-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qa-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Render QA Pages
        run: bun scripts/render-qa-pages.ts --out .site

      - name: Publish gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: .site
          clean: true
          clean-exclude: pr-preview
          force: false
          single-commit: true
          attempt-limit: 3
