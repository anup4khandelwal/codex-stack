name: pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install dependencies
        run: bun install

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1

      - name: Build preview site
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          bun run build
          bun scripts/build-preview-site.ts --out .preview-site

      - name: Publish PR preview
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: .preview-site
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: true
          force: false
          single-commit: true
          attempt-limit: 3

      - name: Run codex-stack review
        run: bun scripts/review-diff.ts --json --base "origin/${{ github.event.pull_request.base.ref }}" > review.json

      - name: Run preview verification for review evidence
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CODEX_STACK_PREVIEW_PATHS: ${{ vars.CODEX_STACK_PREVIEW_PATHS }}
          CODEX_STACK_PREVIEW_DEVICES: ${{ vars.CODEX_STACK_PREVIEW_DEVICES }}
          CODEX_STACK_PREVIEW_FLOW: ${{ vars.CODEX_STACK_PREVIEW_FLOW }}
          CODEX_STACK_PREVIEW_SNAPSHOT: ${{ vars.CODEX_STACK_PREVIEW_SNAPSHOT }}
          CODEX_STACK_PREVIEW_WAIT_TIMEOUT: ${{ vars.CODEX_STACK_PREVIEW_WAIT_TIMEOUT }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          preview_url="https://${owner}.github.io/${repo}/pr-preview/pr-${PR_NUMBER}/"
          args=(
            "--repo" "${GITHUB_REPOSITORY}"
            "--branch" "${GITHUB_HEAD_REF}"
            "--sha" "${GITHUB_SHA}"
            "--pr" "${PR_NUMBER}"
            "--url" "${preview_url}"
            "--publish-dir" "preview-artifacts"
            "--markdown-out" "preview.md"
            "--json-out" "preview.json"
            "--comment-out" "preview-comment.md"
          )

          if [ -n "${CODEX_STACK_PREVIEW_PATHS}" ]; then
            IFS=',' read -r -a preview_paths <<< "${CODEX_STACK_PREVIEW_PATHS}"
            for preview_path in "${preview_paths[@]}"; do
              preview_path="$(printf '%s' "${preview_path}" | xargs)"
              if [ -n "${preview_path}" ]; then
                args+=("--path" "${preview_path}")
              fi
            done
          fi
          if [ -n "${CODEX_STACK_PREVIEW_DEVICES}" ]; then
            IFS=',' read -r -a preview_devices <<< "${CODEX_STACK_PREVIEW_DEVICES}"
            for preview_device in "${preview_devices[@]}"; do
              preview_device="$(printf '%s' "${preview_device}" | xargs)"
              if [ -n "${preview_device}" ]; then
                args+=("--device" "${preview_device}")
              fi
            done
          fi
          if [ -n "${CODEX_STACK_PREVIEW_FLOW}" ]; then
            args+=("--flow" "${CODEX_STACK_PREVIEW_FLOW}")
          fi
          if [ -n "${CODEX_STACK_PREVIEW_SNAPSHOT}" ]; then
            args+=("--snapshot" "${CODEX_STACK_PREVIEW_SNAPSHOT}")
          fi
          if [ -n "${CODEX_STACK_PREVIEW_WAIT_TIMEOUT}" ]; then
            args+=("--wait-timeout" "${CODEX_STACK_PREVIEW_WAIT_TIMEOUT}")
          fi

          bun scripts/preview-verify.ts "${args[@]}"

      - name: Render review outputs
        run: |
          set -euo pipefail
          args=(
            "--input" "review.json"
            "--markdown-out" "review.md"
            "--summary-out" "review-summary.json"
          )
          if [ -f preview.json ]; then
            args+=("--preview-input" "preview.json")
          fi
          bun scripts/render-pr-review.ts "${args[@]}"

      - name: Add step summary
        run: cat review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Sync PR review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("review.md", "utf8");
            const marker = "<!-- codex-stack:pr-review -->";
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Fail on critical findings
        run: |
          set -euo pipefail
          args=(
            "--input" "review.json"
            "--fail-on-critical"
          )
          if [ -f preview.json ]; then
            args+=("--preview-input" "preview.json")
          fi
          bun scripts/render-pr-review.ts "${args[@]}" >/tmp/codex-stack-pr-review.md
