name: preview-verify

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: false
      branch:
        description: Branch ref to resolve in the preview URL template
        required: false
      sha:
        description: Commit SHA to resolve in the preview URL template
        required: false
      preview_url:
        description: Explicit preview URL override
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.event_name == 'workflow_dispatch' || vars.CODEX_STACK_PREVIEW_URL_TEMPLATE != '' || github.event.inputs.preview_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install dependencies
        run: bun install

      - name: Run preview verification
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref || github.event.inputs.branch }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.event.inputs.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr }}
          CODEX_STACK_PREVIEW_URL_TEMPLATE: ${{ vars.CODEX_STACK_PREVIEW_URL_TEMPLATE }}
          CODEX_STACK_PREVIEW_FLOW: ${{ vars.CODEX_STACK_PREVIEW_FLOW }}
          CODEX_STACK_PREVIEW_SNAPSHOT: ${{ vars.CODEX_STACK_PREVIEW_SNAPSHOT }}
          PREVIEW_URL_OVERRIDE: ${{ github.event.inputs.preview_url }}
        run: |
          set -euo pipefail
          args=(
            "--repo" "${GITHUB_REPOSITORY}"
            "--branch" "${GITHUB_HEAD_REF}"
            "--sha" "${GITHUB_SHA}"
            "--pr" "${PR_NUMBER}"
            "--publish-dir" "preview-artifacts"
            "--markdown-out" "preview.md"
            "--json-out" "preview.json"
            "--comment-out" "preview-comment.md"
          )

          if [ -n "${PREVIEW_URL_OVERRIDE}" ]; then
            args+=("--url" "${PREVIEW_URL_OVERRIDE}")
          else
            args+=("--url-template" "${CODEX_STACK_PREVIEW_URL_TEMPLATE}")
          fi

          if [ -n "${CODEX_STACK_PREVIEW_FLOW}" ]; then
            args+=("--flow" "${CODEX_STACK_PREVIEW_FLOW}")
          fi
          if [ -n "${CODEX_STACK_PREVIEW_SNAPSHOT}" ]; then
            args+=("--snapshot" "${CODEX_STACK_PREVIEW_SNAPSHOT}")
          fi

          bun scripts/preview-verify.ts "${args[@]}"

      - name: Add step summary
        run: cat preview.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-verify-${{ github.event.pull_request.number || github.run_id }}
          path: |
            preview.md
            preview.json
            preview-comment.md
            preview-artifacts

      - name: Sync preview PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("preview-comment.md", "utf8");
            const marker = "<!-- codex-stack:preview-verify -->";
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Fail on blocking preview result
        run: |
          bun -e 'const report = JSON.parse(require("fs").readFileSync("preview.json", "utf8")); if (["critical", "error"].includes(String(report.status || ""))) process.exit(2);'
